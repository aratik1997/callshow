<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kolshi</title>
<link rel="icon" type="image/svg+xml" href="images/callshow.svg">
<link rel="alternate icon" href="images/callshow.png">
<link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
<div class="landing-wrap">
  <div class="logo">
    <img src="images/callshow.png" alt="Kolshi">
    <h1>KOLSHI</h1>
    <div class="suits">♠ <span class="red">♥</span> <span class="red">♦</span> ♣</div>
  </div>

  <div class="card-panel">
    <div class="tabs">
      <button class="tab-btn active" data-tab="create">Create Room</button>
      <button class="tab-btn" data-tab="join">Join Room</button>
    </div>

    <div id="tab-create" class="tab-content">
      <div class="field">
        <label for="create-name">Your name</label>
        <input id="create-name" maxlength="20" placeholder="e.g. Alex" autocomplete="off">
      </div>
      <div class="form-error" id="create-error"></div>
      <button class="btn-primary panel-action" id="create-btn">Create Room</button>
    </div>

    <div id="tab-join" class="tab-content hidden">
      <div class="field">
        <label for="join-name">Your name</label>
        <input id="join-name" maxlength="20" placeholder="e.g. Sam" autocomplete="off">
      </div>
      <div class="field">
        <label for="join-code">Room code</label>
        <input id="join-code" class="code-input" maxlength="5" placeholder="ABCDE" autocomplete="off">
      </div>
      <div class="form-error" id="join-error"></div>
      <button class="btn-primary panel-action" id="join-btn">Join Room</button>
    </div>
  </div>

  <div class="rules-link"><a href="rules.html">How do I play Kolshi?</a></div>
</div>

<script src="js/landing.js?v=7"></script>
</body>
</html>
